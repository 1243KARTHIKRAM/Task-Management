# Server Configuration
# Render provides the PORT environment variable
server.port=${PORT:8080}

# Database Configuration
# Use environment variables for database connection
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/task_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:Gkarthik1243@}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Validation Configuration
spring.validation.messages.basename=messages

# Springdoc OpenAPI (Swagger) Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# Logging Configuration
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
logging.level.com.taskmanagement=DEBUG

# JWT Configuration
# Use environment variable with a fallback for development
jwt.secret=${JWT_SECRET:YourSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong123456789}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS Configuration
# Allow requests from your frontend on Render
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
